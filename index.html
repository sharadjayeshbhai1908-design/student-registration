<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Premium Portal</title>
    <meta name="description" content="Secure and modern student registration portal for easy enrollment and data management.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('student_registration_bg_1778051615448.png') no-repeat center center fixed;
            background-size: cover;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer-actions {
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }

        .btn-excel {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-excel:hover {
            filter: brightness(0.9);
            transform: scale(1.02);
        }

        /* Responsive Mobile Tweak */
        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            .header h1 {
                font-size: 24px;
            }
        }

        /* Success Message Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Student Registration</h1>
            <p>Join our academic community today</p>
        </div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <i data-lucide="phone"></i>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                </div>
            </div>

            <div class="form-group">
                <label for="course">Select Course</label>
                <div class="input-wrapper">
                    <i data-lucide="graduation-cap"></i>
                    <select id="course" required>
                        <option value="" disabled selected>Choose a course</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Business Admin">Business Admin</option>
                        <option value="Digital Marketing">Digital Marketing</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Submit Registration
                <i data-lucide="send" style="position: static; width: 18px; height: 18px; color: white;"></i>
            </button>
        </form>

        <div class="footer-actions">
            <button class="btn-excel" onclick="exportToExcel()">
                <i data-lucide="file-spreadsheet"></i>
                Download Excel Sheet
            </button>
        </div>
    </div>

    <div id="toast">
        <i data-lucide="check-circle"></i>
        Registration successful!
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const form = document.getElementById('registrationForm');
        const toast = document.getElementById('toast');

        // Store data in local storage to simulate a database
        let registrations = JSON.parse(localStorage.getItem('registrations')) || [];

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = {
                id: Date.now(),
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                course: document.getElementById('course').value,
                date: new Date().toLocaleString()
            };

            // Add to our list
            registrations.push(formData);
            localStorage.setItem('registrations', JSON.stringify(registrations));

            // Show Success
            toast.classList.add('show');
            form.reset();

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        });

        function exportToExcel() {
            if (registrations.length === 0) {
                alert("No data available to export yet. Please submit a form first!");
                return;
            }

            // Create a worksheet from the data
            const worksheet = XLSX.utils.json_to_sheet(registrations);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Students");

            // Export the file
            XLSX.writeFile(workbook, "Student_Registrations.xlsx");
        }
    </script>
</body>
</html>
